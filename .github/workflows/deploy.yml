name: Deploy Prod

on:
  workflow_run:
    workflows: ['Build & Push Image']
    types: [completed]
    branches: [main]

jobs:
  deploy-prod:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy Production
        run: |
          ssh deploy@${{ secrets.SERVER_IP }} "
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u elrafael --password-stdin &&
            cd /srv/angular-ssr &&
            docker compose pull angular-ssr &&
            docker compose up -d angular-ssr
          "
