<nav class="flex mb-4 mt-4 p-2 text-sm text-slate-500 font-medium" aria-label="Breadcrumb">
  <ol class="inline-flex items-center space-x-1 md:space-x-3">
    <li class="inline-flex items-center">
      <a [routerLink]="['/']" class="hover:text-blue-600 transition-colors">Home</a>
    </li>

    <li>
      <div class="flex items-center">
        <span class="mx-2 text-slate-300">/</span>
        <a [routerLink]="['/posts']" class="hover:text-blue-600 transition-colors">Posts</a>
      </div>
    </li>

    <li aria-current="page">
      <div class="flex items-center">
        <span class="mx-2 text-slate-300">/</span>
        <span class="text-slate-400 truncate max-w-[150px] md:max-w-xs">
          {{ post()?.title || 'Carregando...' }}
        </span>
      </div>
    </li>
  </ol>
</nav>
<article class="p-6 bg-white rounded-2xl shadow-sm border border-slate-100">
  <header class="mb-6">
    <h1 class="text-3xl font-bold text-slate-900 mb-2">{{ post()?.title }}</h1>
    <p class="text-slate-500 italic">
      Escrito por: <span class="font-semibold">{{ user()?.name }}</span>
    </p>
  </header>

  <p class="text-lg text-slate-700 leading-relaxed mb-8">
    {{ post()?.body }}
  </p>
  <app-comments [postId]="id()" />
</article>
